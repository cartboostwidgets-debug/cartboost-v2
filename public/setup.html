<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectá tu tienda - CartBoost</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .setup-wrapper { max-width: 440px; margin: 60px auto; padding: 0 16px; text-align: center; }
        .setup-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; }
        .connect-card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .connect-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
        .btn-nuvem { background: var(--primary); color: white; width: 100%; padding: 16px; border-radius: 9999px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 12px; border: none; transition: 0.2s; cursor: pointer; font-size: 1rem; }
        .btn-nuvem:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-nuvem svg { fill: white; width: 20px; height: 20px; }
    </style>
</head>
<body style="background: white;">
    <div class="setup-wrapper">
        <h1 class="setup-title">Conectá tu tienda</h1>
        <div class="connect-card">
            <p class="connect-title">Tiendanube</p>
            <button id="btn-nuvem-connect" class="btn-nuvem">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Conectar Tiendanube
            </button>
        </div>
        <div style="margin-top: 16px; font-size: 0.9rem; color: #64748b;">
            Serás redirigido a Tiendanube para autorizar la conexión.
        </div>
    </div>
    <!-- Chat flotante -->
    <button id="chat-float" class="chat-btn">💬</button>

    <script type="module">
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        
        // ⚠️ Misma configuración que en auth.js
        const firebaseConfig = {
            apiKey: "TU_API_KEY_DE_FIREBASE",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Redirigir a Login si no está autenticado (Seguridad)
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = '/login';
        });

        document.getElementById('btn-nuvem-connect').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return window.location.href = '/login';
            
            const token = await user.getIdToken();
            // Redirigir al backend para iniciar el OAuth real
            window.location.href = `/auth/nuvem?token=${token}`;
        });
    </script>
</body>
</html>
