<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - CartBoost</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .auth-wrapper { max-width: 440px; margin: 40px auto; padding: 0 16px; }
        .auth-logo { display: flex; justify-content: center; margin-bottom: 20px; }
        .auth-title { text-align: center; font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
        .auth-sub { text-align: center; color: var(--text-secondary); margin-bottom: 24px; }
        .auth-sub a { color: var(--primary); text-decoration: underline; cursor: pointer;}
        .btn-google { background: #1e293b; color: white; width: 100%; padding: 14px; border-radius: 9999px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 12px; border: none; margin-bottom: 24px; transition: 0.2s; }
        .btn-google:hover { background: #0f172a; transform: translateY(-2px); }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-form label { font-weight: 600; font-size: 0.9rem; }
        .auth-form input { padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; font-size: 1rem; outline: none; transition: 0.2s; }
        .auth-form input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .error-msg { color: #dc2626; font-size: 0.85rem; text-align: center; margin-top: -8px; min-height: 20px; }
        .btn-register { width: 100%; padding: 16px; border-radius: 9999px; background: var(--primary); color: white; border: none; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-register:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .terms-legal { text-align: center; font-size: 0.8rem; color: var(--text-secondary); margin-top: 16px; }
        .terms-legal a { color: var(--gray-900); text-decoration: underline; }
    </style>
</head>
<body style="background: white;">
    <div class="auth-wrapper">
        <div class="auth-logo">
            <div class="logo-box">
                <div class="logo-icon"><span></span><span></span><span></span><span></span></div>
            </div>
        </div>
        <h1 class="auth-title">Registrate gratis</h1>
        <p class="auth-sub">¿Ya tenés una cuenta? <a href="/login">Iniciar sesión</a></p>
        
        <button class="btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#4285F4" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Registrate con Google
        </button>

        <form id="register-form" class="auth-form">
            <div>
                <label>Tu dirección de email</label>
                <input type="email" id="reg-email" required placeholder="nombre@ejemplo.com">
            </div>
            <div>
                <label>Contraseña</label>
                <input type="password" id="reg-password" required minlength="6" placeholder="••••••">
            </div>
            <div>
                <label>Repite tu contraseña</label>
                <input type="password" id="reg-confirm" required minlength="6" placeholder="••••••">
            </div>
            <div id="reg-error" class="error-msg"></div>
            <button id="btn-register" type="submit" class="btn-register">Registrate →</button>
        </form>
        
        <p class="terms-legal">Al registrarse estás aceptando nuestros <a href="#">términos y condiciones</a> y <a href="#">políticas de privacidad</a>.</p>
    </div>
    <!-- Chat flotante (Replicado de la landing) -->
    <button id="chat-float" class="chat-btn">💬</button>
    
    <script type="module" src="js/auth.js"></script>
</body>
</html>
